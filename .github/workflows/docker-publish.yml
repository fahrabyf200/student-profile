name: Build and Push Docker Image
on:
  push:
    branches: [ master ]

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Menggunakan nama secret sesuai image_e3fa45.png
          username: ${{ secrets.DOCKERHUB_FARHAN54564 }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Menggunakan username langsung untuk tag image
          tags: farhan54564/student-profile:latest